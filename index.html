          <div class="card" style="margin-bottom:12px;">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
              <div class="card-title" style="font-size:15px; margin:0;">📖 ${this.escapeHtml(chapter)}</div>
              <div style="display:flex; gap:4px;">
                <button class="btn btn-outline btn-sm" onclick="app.showEditChapterModal('${selectedSubject}', '${this.escapeForAttr(chapter)}')">✏️</button>
                <button class="btn btn-outline btn-sm" onclick="app.showAddPointModal('${selectedSubject}', '${this.escapeForAttr(chapter)}')">➕</button>
                <button class="btn btn-danger btn-sm" onclick="app.deleteChapterConfirm('${selectedSubject}', '${this.escapeForAttr(chapter)}')">🗑️</button>
              </div>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
        `;
        points.forEach(point => {
          const level = (knowledge[chapter] && knowledge[chapter][point]) || 0;
          const ec = this.escapeForAttr(chapter);
          const ep = this.escapeForAttr(point);
          html += `
            <div class="heatmap-item" onclick="app.cycleMastery('${userId}', '${selectedSubject}', '${ec}', '${ep}', ${level})"
              oncontextmenu="event.preventDefault(); app.showEditPointMenu('${userId}', '${selectedSubject}', '${ec}', '${ep}'); return false;"
              style="padding:8px 12px; cursor:pointer; min-width:120px; position:relative;" title="左键切换掌握度 | 右键编辑">
              <div class="heatmap-dot level-${level}" style="width:16px; height:16px; border-radius:50%;"></div>
              <div class="heatmap-info">
                <div class="heatmap-name" style="font-size:13px;">${this.escapeHtml(point)}</div>
                <div style="font-size:11px; color:var(--text-secondary);">
                  ${['未学','初学','了解','熟悉','掌握','精通'][level]}
                </div>
              </div>
            </div>
          `;
        });
        if (points.length === 0) {
          html += `<div style="color:var(--text-secondary); font-size:13px; padding:12px;">暂无知识点，点击「➕」添加</div>`;
        }
        html += `</div></div>`;
      });
      html += `</div>`;
    } else {
      html += `
        <div class="empty-state">
          <div class="icon">📖</div>
          <p>还没有章节</p>
          <button class="btn btn-primary" onclick="app.showAddChapterModal()">➕ 新建第一个章节</button>
        </div>
      `;
    }

    html += `
      <div class="card" style="margin-top:16px;">
        <div class="card-header"><span class="card-title">📊 ${subjectName(selectedSubject)} 掌握度统计</span></div>
    `;

    const stats = dm.getMasteryStats(userId, selectedSubject);
    html += `
      <div style="display:flex; align-items:center; gap:16px;">
        <div style="flex:1;">
          <div class="progress-bar-wrap" style="height:20px;">
            <div class="progress-bar-fill" style="width:${stats.percentage}%; background:linear-gradient(90deg, #3B82F6, #34D399);"></div>
          </div>
        </div>
        <span style="font-weight:700; font-size:18px;">${stats.percentage}%</span>
      </div>
      <div style="font-size:13px; color:var(--text-secondary); margin-top:8px;">
        已掌握 ${stats.mastered} / ${stats.total} 个知识点
      </div>
    `;

    // Count by level
    const levelCounts = [0, 0, 0, 0, 0, 0];
    if (knowledge) {
      for (const [chapter, points] of Object.entries(knowledge)) {
        if (chapter === '_meta') continue;
        for (const [point, level] of Object.entries(points)) {
          levelCounts[level] = (levelCounts[level] || 0) + 1;
        }
      }
    }
    html += `<div style="display:flex; gap:12px; margin-top:12px; font-size:12px; flex-wrap:wrap;">`;
    ['未学','初学','了解','熟悉','掌握','精通'].forEach((label, i) => {
      html += `<span>${label}: <strong>${levelCounts[i]}</strong></span>`;
    });
    html += `</div></div>`;

    container.innerHTML = html;
  },

  escapeForAttr(str) {
    return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
  },

  selectHeatmapSubject(subject) {
    this._heatmapSubject = subject;
    this.switchView('heatmap');
  },

  cycleMastery(userId, subject, chapter, point, currentLevel) {
    const newLevel = (currentLevel + 1) % 6;
    dm.setMastery(userId, subject, chapter, point, newLevel);
    this.switchView('heatmap');
  },

  // --- Chapter & Point Editing ---
  showAddChapterModal() {
    const selectedSubject = this._heatmapSubject || dm.getUserSubjects(dm.getCurrentUser())[0];
    let content = `
      <div class="form-group">
        <label class="form-label">科目</label>
        <select class="form-select" id="ch-subject">${dm.getUserSubjects(dm.getCurrentUser()).map(s => `<option value="${s}" ${s === selectedSubject ? 'selected' : ''}>${subjectName(s)}</option>`).join('')}</select>
      </div>
      <div class="form-group">
        <label class="form-label">章节名称 *</label>
        <input class="form-input" id="ch-name" placeholder="如：级数、原子物理...">
      </div>
    `;
    this.showModal('➕ 新建章节', content, () => {
      const subj = document.getElementById('ch-subject').value;
      const name = document.getElementById('ch-name').value.trim();
      if (!name) { this.showToast('请输入章节名称', 'error'); return false; }
      if (!dm.addChapter(dm.getCurrentUser(), subj, name)) {
        this.showToast('章节已存在', 'error'); return false;
      }
      this._heatmapSubject = subj;
      this.showToast('章节已创建 ✅');
      this.switchView('heatmap');
    });
  },

  showEditChapterModal(subject, chapter) {
    let content = `
      <input type="hidden" id="edit-ch-subject" value="${subject}">
      <input type="hidden" id="edit-ch-old" value="${this.escapeHtml(chapter)}">
      <div class="form-group">
        <label class="form-label">重命名章节</label>
        <input class="form-input" id="edit-ch-name" value="${this.escapeHtml(chapter)}">
      </div>
      <div class="form-group">
        <label class="form-label">或在此章节添加知识点</label>
        <div style="display:flex; gap:8px;">
          <input class="form-input" id="edit-ch-newpt" placeholder="新知识点名称...">
          <button class="btn btn-success btn-sm" onclick="event.preventDefault(); const subj=document.getElementById('edit-ch-subject').value; const ch=document.getElementById('edit-ch-old').value; const pt=document.getElementById('edit-ch-newpt').value.trim(); if(pt){dm.addKnowledgePoint(dm.getCurrentUser(),subj,ch,pt);app.closeModal();app.showToast('知识点已添加 ✅');app.switchView('heatmap');}">添加</button>
        </div>
      </div>
      <div style="color:var(--text-secondary); font-size:13px; margin-top:8px;">
        章节下有 ${dm.getChapterPoints(dm.getCurrentUser(), subject, chapter).length} 个知识点
      </div>
    `;
    this.showModal('✏️ 编辑章节', content, () => {
      const subj = document.getElementById('edit-ch-subject').value;
      const oldName = document.getElementById('edit-ch-old').value;
      const newName = document.getElementById('edit-ch-name').value.trim();
      if (!newName) { this.showToast('名称不能为空', 'error'); return false; }
      if (oldName === newName) return;
      if (!dm.renameChapter(dm.getCurrentUser(), subj, oldName, newName)) {
        this.showToast('重命名失败，名称可能已存在', 'error'); return false;
      }
      this.showToast('章节已重命名 ✅');
      this.switchView('heatmap');
    });
  },

  deleteChapterConfirm(subject, chapter) {
    const count = dm.getChapterPoints(dm.getCurrentUser(), subject, chapter).length;
    if (confirm(`确定删除章节「${chapter}」及其全部 ${count} 个知识点吗？此操作不可恢复。`)) {
      dm.deleteChapter(dm.getCurrentUser(), subject, chapter);
      this.showToast('章节已删除');
      this.switchView('heatmap');
    }
  },

  showAddPointModal(subject, chapter) {
    let content = `
      <input type="hidden" id="pt-subject" value="${subject}">
      <input type="hidden" id="pt-chapter" value="${this.escapeHtml(chapter)}">
      <div class="form-group">
        <label class="form-label">在「${this.escapeHtml(chapter)}」中添加知识点</label>
        <input class="form-input" id="pt-name" placeholder="知识点名称...">
      </div>
    `;
    this.showModal('➕ 添加知识点', content, () => {
      const subj = document.getElementById('pt-subject').value;
      const ch = document.getElementById('pt-chapter').value;
      const name = document.getElementById('pt-name').value.trim();
      if (!name) { this.showToast('请输入知识点名称', 'error'); return false; }
      if (!dm.addKnowledgePoint(dm.getCurrentUser(), subj, ch, name)) {
        this.showToast('知识点已存在', 'error'); return false;
      }
      this.showToast('知识点已添加 ✅');
      this.switchView('heatmap');
    });
  },

  showEditPointMenu(userId, subject, chapter, point) {
    let content = `
      <input type="hidden" id="epm-subject" value="${subject}">
      <input type="hidden" id="epm-chapter" value="${this.escapeHtml(chapter)}">
      <input type="hidden" id="epm-old" value="${this.escapeHtml(point)}">
      <div class="form-group">
        <label class="form-label">重命名知识点</label>
        <input class="form-input" id="epm-name" value="${this.escapeHtml(point)}">
      </div>
      <div style="margin-bottom:16px;">
        <button class="btn btn-danger btn-sm" onclick="if(confirm('确定删除知识点「${this.escapeHtml(point)}」吗？')){dm.deleteKnowledgePoint('${userId}','${subject}','${this.escapeHtml(chapter)}','${this.escapeHtml(point)}');app.closeModal();app.showToast('知识点已删除');app.switchView('heatmap');}">🗑️ 删除此知识点</button>
      </div>
    `;
    this.showModal('✏️ 编辑知识点', content, () => {
      const subj = document.getElementById('epm-subject').value;
      const ch = document.getElementById('epm-chapter').value;
      const oldName = document.getElementById('epm-old').value;
      const newName = document.getElementById('epm-name').value.trim();
      if (!newName) { this.showToast('名称不能为空', 'error'); return false; }
      if (oldName === newName) return;
      if (!dm.renameKnowledgePoint(userId, subj, ch, oldName, newName)) {
        this.showToast('重命名失败，名称可能已存在', 'error'); return false;
      }
      this.showToast('知识点已重命名 ✅');
      this.switchView('heatmap');
    });
  },

  // ==========================================
  // VIEW: POMODORO (番茄钟)
  // ==========================================
  renderPomodoro(container) {
    const userId = dm.getCurrentUser();
    const user = dm.getUser(userId);
    const subjects = dm.getUserSubjects(userId);
    const today = new Date().toISOString().split('T')[0];

    // Initialize timer state if needed
    if (!this._pomodoro) {
      this._pomodoro = {
        isRunning: false,
        isBreak: false,
        timeLeft: 25 * 60,
        subject: subjects[0],
        intervalId: null,
        totalSessions: 0
      };
    }

    const p = this._pomodoro;
    const mins = Math.floor(p.timeLeft / 60);
    const secs = p.timeLeft % 60;
    const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    const totalTime = dm.getTotalStudyTime(userId);
    const todayTime = dm.getPomodoroSessions({ userId, date: today, type: 'focus' })
      .reduce((s, sess) => s + sess.duration, 0);
    const recentSessions = dm.getPomodoroSessions({ userId }).slice(0, 10);

    let html = `
      <div class="page-header">
        <h1 class="page-title">⏱️ 番茄钟</h1>
        <p class="page-subtitle">${user.name} · 累计专注 ${formatTime(totalTime)} · 今日 ${formatTime(todayTime)}</p>
      </div>

      <div class="pomodoro-container">
        <div class="pomodoro-timer ${p.isRunning ? (p.isBreak ? 'break' : 'running') : ''}"
          onclick="app.togglePomodoro()" id="pomodoro-circle">
          <div class="pomodoro-time">${timeStr}</div>
          <div class="pomodoro-label">${p.isBreak ? '☕ 休息' : '🎯 专注'}</div>
        </div>

        <div class="pomodoro-controls">
          <button class="btn btn-primary btn-lg" onclick="app.togglePomodoro()">
            ${p.isRunning ? '⏸️ 暂停' : '▶️ 开始'}
          </button>
          <button class="btn btn-outline" onclick="app.resetPomodoro()">🔄 重置</button>
        </div>

        <div class="card" style="margin-bottom:16px;">
          <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-sm ${p.timeLeft === 25*60 && !p.isBreak ? 'btn-primary' : 'btn-outline'}"
              onclick="app.setPomodoroTime(25)">🎯 25分钟</button>
            <button class="btn btn-sm ${p.timeLeft === 45*60 && !p.isBreak ? 'btn-primary' : 'btn-outline'}"
              onclick="app.setPomodoroTime(45)">🔥 45分钟</button>
            <button class="btn btn-sm ${p.isBreak && p.timeLeft === 5*60 ? 'btn-primary' : 'btn-outline'}"
              onclick="app.setBreakTime(5)">☕ 5分钟休息</button>
            <button class="btn btn-sm ${p.isBreak && p.timeLeft === 15*60 ? 'btn-primary' : 'btn-outline'}"
              onclick="app.setBreakTime(15)">🛋️ 15分钟休息</button>
          </div>
        </div>

        <div class="card">
          <div class="form-group">
            <label class="form-label">当前科目</label>
            <select class="form-select" onchange="app._pomodoro.subject = this.value" id="pomo-subject" style="max-width:200px; margin:0 auto;">
              ${subjects.map(s => `<option value="${s}" ${s === p.subject ? 'selected' : ''}>${subjectName(s)}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="card" style="text-align:center;">
          <button class="btn btn-outline btn-sm" onclick="app.showForestImportModal()">🌳 导入 Forest 专注数据</button>
          <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">支持从Forest专注森林App导入CSV数据</div>
        </div>

        <div class="card pomodoro-sessions">
          <div style="font-weight:700; margin-bottom:10px;">📋 近期记录</div>
          ${recentSessions.length === 0 ? '<div style="text-align:center; color:var(--text-secondary); padding:10px;">暂无记录，开始你的第一个番茄钟吧！</div>' : ''}
          ${recentSessions.map(s => `
            <div class="session-row">
              <span>${s.type === 'focus' ? '🎯' : '☕'} ${s.type === 'focus' ? '专注' : '休息'}</span>
              <span>${formatTime(s.duration)}</span>
              <span>${subjectName(s.subject)}</span>
              <span>${s.date}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    container.innerHTML = html;
  },

  togglePomodoro() {
    const p = this._pomodoro;
    if (p.isRunning) {
      clearInterval(p.intervalId);
      p.isRunning = false;
    } else {
      p.subject = document.getElementById('pomo-subject')?.value || p.subject;
      p.isRunning = true;
      p.intervalId = setInterval(() => this.pomodoroTick(), 1000);
    }
    this.switchView('pomodoro');
  },

  pomodoroTick() {
    const p = this._pomodoro;
    p.timeLeft--;

    if (p.timeLeft <= 0) {
      clearInterval(p.intervalId);
      p.isRunning = false;

      if (!p.isBreak) {
        // Focus session completed
        p.totalSessions++;
        dm.addPomodoroSession({
          userId: dm.getCurrentUser(),
          subject: p.subject,
          duration: p._sessionDuration || 25 * 60,
          type: 'focus',
          date: new Date().toISOString().split('T')[0]
        });
        this.showToast(`🎉 专注完成！休息一下吧~ (已完成 ${p.totalSessions} 个番茄)`);
        // Switch to break
        p.isBreak = true;
        p.timeLeft = 5 * 60;
      } else {
        // Break completed
        dm.addPomodoroSession({
          userId: dm.getCurrentUser(),
          subject: p.subject,
          duration: p._breakDuration || 5 * 60,
          type: 'break',
          date: new Date().toISOString().split('T')[0]
        });
        this.showToast('☕ 休息结束，开始新的专注吧！');
        p.isBreak = false;
        p.timeLeft = p._sessionDuration || 25 * 60;
      }
    }

    this.switchView('pomodoro');
  },

  resetPomodoro() {
    const p = this._pomodoro;
    clearInterval(p.intervalId);
    p.isRunning = false;
    p.isBreak = false;
    p.timeLeft = 25 * 60;
    this.switchView('pomodoro');
  },

  setPomodoroTime(minutes) {
    const p = this._pomodoro;
    clearInterval(p.intervalId);
    p.isRunning = false;
    p.isBreak = false;
    p.timeLeft = minutes * 60;
    p._sessionDuration = minutes * 60;
    this.switchView('pomodoro');
  },

  setBreakTime(minutes) {
    const p = this._pomodoro;
    clearInterval(p.intervalId);
    p.isRunning = false;
    p.isBreak = true;
    p.timeLeft = minutes * 60;
    p._breakDuration = minutes * 60;
    this.switchView('pomodoro');
  }
};

console.log('Script parsed successfully, DM initialized');

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  console.log('DOMContentLoaded fired, calling init...');
  try {
    app.init();
    console.log('Init completed successfully');
    document.title = '考研复习管理系统 - 数一 · 英一 · 专业课';
  } catch(e) {
    console.error('Init error:', e);
    document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;background:#fff;max-width:900px;margin:20px auto;border:2px solid red;border-radius:8px;"><h2>❌ Init Error</h2><pre style="white-space:pre-wrap;word-break:break-all;">' + e.message + '\n\n' + (e.stack || '') + '</pre></div>';
  }
});
</script>
</body>
</html>
