<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研复习管理系统 - 数一 · 英一 · 专业课</title>
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="icon">📚</span>
    <span>考研助手</span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item" data-view="dashboard">
      <span>📊</span> <span>学习概览</span>
    </button>
    <button class="nav-item active" data-view="error-journal">
      <span>❌</span> <span>错题本</span>
      <span class="badge" id="review-badge">0</span>
    </button>
    <button class="nav-item" data-view="progress">
      <span>📈</span> <span>进度对比</span>
    </button>
    <button class="nav-item" data-view="plan">
      <span>📋</span> <span>学习计划</span>
    </button>
    <button class="nav-item" data-view="heatmap">
      <span>🔥</span> <span>知识点热力图</span>
    </button>
    <button class="nav-item" data-view="pomodoro">
      <span>⏱️</span> <span>番茄钟</span>
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="user-switch" id="user-switch-btn" onclick="app.toggleUser()">
      <div class="avatar avatar-me" id="current-avatar">张</div>
      <span id="current-user-name">当前：张</span>
    </button>
    <div class="sync-status sync-local" id="sync-status">本地模式</div>
    <div style="display:flex; gap:4px; margin-top:8px;">
      <button class="btn btn-outline btn-sm" onclick="app.exportData()" style="flex:1;">📤 导出</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()" style="flex:1;">📥 导入</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="app.importData(event)">
    </div>
    <div style="margin-top:4px;">
      <button class="btn btn-outline btn-sm" onclick="app.showForestImportModal()" style="width:100%;">🌳 导入Forest数据</button>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main" id="main-content"></main>

<!-- Modal Container -->
<div id="modal-container"></div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="assets/js/app.js"></script>
</body>
</html>
